<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoToAudio | Professional MP4 to MP3 Converter</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6826893749612512" crossorigin="anonymous"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>

    <style>
        :root {
            --bg-color: #0B1120;
            --card-bg: #1F2937;
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --success: #10B981;
            --border-color: #374151;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e3a8a20, transparent 40%),
                              radial-gradient(circle at bottom left, #4c1d9520, transparent 40%);
        }

        header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 17, 32, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(to right, #60A5FA, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            gap: 20px;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 760px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .card h2 { font-size: 1.6rem; margin-bottom: 8px; }
        .card p.subtitle { color: var(--text-muted); margin-bottom: 20px; font-size: 0.9rem; }

        .upload-zone {
            border: 2px dashed var(--border-color);
            background: rgba(55, 65, 81, 0.3);
            border-radius: 12px;
            padding: 45px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-zone.dragover { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .upload-zone:hover { border-color: #60A5FA; }
        .upload-icon { width: 44px; height: 44px; fill: var(--text-muted); margin-bottom: 12px; }
        .upload-text { font-size: 1rem; font-weight: 600; }
        .upload-text span { color: var(--primary); }
        input[type="file"] { display: none; }

        .btn {
            background: linear-gradient(135deg, var(--primary), #4F46E5);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            display: none;
            transition: all 0.2s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 12px rgba(59, 130, 246, 0.3); }
        .btn:disabled { background: #4b5563; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            padding: 14px 40px;
            border-radius: 8px;
            font-weight: 600;
            color: white;
        }

        .status-container { display: none; margin-top: 25px; }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { 
            width: 100%; 
            padding: 20px 0; 
            text-align: center; 
            border-top: 1px solid var(--border-color); 
            color: var(--text-muted); 
            font-size: 0.8rem; 
            margin-top: auto; 
        }
    </style>
</head>
<body>

    <header>
        <h1>VideoToAudio</h1>
    </header>

    <div class="page-layout">
        <div class="main-wrapper">
            <div class="card">
                <h2>Convert MP4 to MP3</h2>
                <p class="subtitle">Extract high-quality audio from videos of any size, instantly in your browser.</p>

                <div class="upload-zone" id="dropZone" onclick="document.getElementById('videoInput').click()">
                    <svg class="upload-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                    </svg>
                    <p class="upload-text" id="fileLabel">Drag & drop your file here or <span>Browse</span></p>
                    <input type="file" id="videoInput" accept="video/mp4">
                </div>
                
                <button id="convertBtn" class="btn">Convert to MP3</button>

                <div class="status-container" id="statusContainer">
                    <div class="spinner"></div>
                    <p id="statusText" style="font-weight: 600;">Preparing conversion engine...</p>
                </div>

                <div id="resultContainer" style="display:none; margin-top: 20px;">
                    <h3 style="color: var(--text-main); margin-bottom: 10px;">Conversion Successful!</h3>
                    <a href="#" id="downloadLink" class="btn-success">Download MP3 File</a>
                </div>
            </div>
        </div>
    </div>

    <footer><p>&copy; 2026 VideoToAudio. All rights reserved.</p></footer>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });

        const videoInput = document.getElementById('videoInput');
        const fileLabel = document.getElementById('fileLabel');
        const convertBtn = document.getElementById('convertBtn');
        const statusContainer = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const downloadLink = document.getElementById('downloadLink');
        const dropZone = document.getElementById('dropZone');

        let selectedFile = null;

        function handleFile(file) {
            if (file && file.type === "video/mp4") {
                selectedFile = file;
                fileLabel.innerHTML = `Selected: <span style="color: var(--success);">${file.name}</span>`;
                convertBtn.style.display = "block";
                resultContainer.style.display = "none";
            } else {
                alert("Please select a valid MP4 file.");
            }
        }

        videoInput.addEventListener('change', function() { handleFile(this.files[0]); });
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) { handleFile(e.dataTransfer.files[0]); }
        });

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            convertBtn.style.display = "none";
            dropZone.style.display = "none";
            statusContainer.style.display = "block";
            statusText.innerText = "Loading conversion engine (This may take a moment on the first run)...";

            try {
                if (!ffmpeg.isLoaded()) {
                    await ffmpeg.load();
                }

                statusText.innerText = "Processing video, extracting audio... (Please wait)";

                ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(selectedFile));

                await ffmpeg.run('-i', 'input.mp4', '-vn', '-acodec', 'libmp3lame', '-ab', '192k', 'output.mp3');

                statusText.innerText = "Preparing your download...";

                const data = ffmpeg.FS('readFile', 'output.mp3');
                const audioBlob = new Blob([data.buffer], { type: 'audio/mp3' });
                const audioUrl = URL.createObjectURL(audioBlob);

                downloadLink.href = audioUrl;
                downloadLink.download = selectedFile.name.replace('.mp4', '.mp3');

                statusContainer.style.display = "none";
                resultContainer.style.display = "block";

                ffmpeg.FS('unlink', 'input.mp4');
                ffmpeg.FS('unlink', 'output.mp3');

                setTimeout(() => {
                    dropZone.style.display = "block";
                    fileLabel.innerHTML = 'Drag & drop your file here or <span>Browse</span>';
                    selectedFile = null;
                }, 8000);

            } catch (error) {
                console.error(error);
                alert("An error occurred during conversion: " + error.message);
                statusContainer.style.display = "none";
                dropZone.style.display = "block";
                convertBtn.style.display = "block";
            }
        });
    </script>
</body>
</html>
